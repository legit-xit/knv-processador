<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirvano Processador</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .upload-area {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s;
            background: #111;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #6366f1;
            background: #1a1a2e;
        }
        .upload-area p { color: #888; margin-top: 0.5rem; font-size: 0.85rem; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        input[type="file"] { display: none; }
        .btn {
            display: none;
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: wait; }
        .file-name {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #1a1a2e;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: none;
        }
        .status {
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .processing { color: #a5b4fc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kirvano Processador</h1>
        <p class="sub">Joga o CSV bruto e baixa o .xlsx pronto</p>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📄</div>
            <strong>Clica ou arrasta o CSV aqui</strong>
            <p>Arquivo .csv da plataforma</p>
        </div>

        <div class="file-name" id="fileName"></div>
        <input type="file" id="fileInput" accept=".csv">
        <button class="btn" id="processBtn" onclick="processar()">Processar e Baixar</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const statusEl = document.getElementById('status');

        const COLS_TO_DROP = new Set([
            'Comissão', 'Desconto (Valor)', 'Desconto (Automático)', 'Taxas',
            'Parcelamento sem juros', 'Cliente (IP)', 'Cliente (CEP)',
            'Cliente (Logradouro)', 'Cliente (Número)', 'Cliente (Complemento)',
            'Cliente (Bairro)', 'Cliente (Cidade)', 'Cliente (Estado)',
            'Cliente (País)', 'Afiliado (Nome)', 'Afiliado (E-mail)',
            'UTM SRC', 'UTM Source', 'UTM Medium', 'UTM Campaign',
            'UTM Term', 'UTM Content'
        ]);

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                fileInput.files = e.dataTransfer.files;
                mostrarArquivo(e.dataTransfer.files[0]);
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) mostrarArquivo(fileInput.files[0]);
        });

        function mostrarArquivo(file) {
            fileName.textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB)';
            fileName.style.display = 'block';
            processBtn.style.display = 'block';
            statusEl.style.display = 'none';
        }

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + type;
            statusEl.style.display = 'block';
        }

        function parseCSV(text) {
            const rows = [];
            let current = '';
            let inQuotes = false;
            let row = [];

            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (inQuotes) {
                    if (ch === '"') {
                        if (i + 1 < text.length && text[i + 1] === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = false;
                        }
                    } else {
                        current += ch;
                    }
                } else {
                    if (ch === '"') {
                        inQuotes = true;
                    } else if (ch === ';') {
                        row.push(current);
                        current = '';
                    } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                        row.push(current);
                        current = '';
                        if (row.length > 1) rows.push(row);
                        row = [];
                        if (ch === '\r') i++;
                    } else {
                        // Remove illegal XML chars
                        const code = ch.charCodeAt(0);
                        if (code > 8 && code !== 11 && code !== 12 && (code < 14 || code > 31)) {
                            current += ch;
                        }
                    }
                }
            }
            // Last row
            if (current || row.length) {
                row.push(current);
                if (row.length > 1) rows.push(row);
            }
            return rows;
        }

        async function processar() {
            const file = fileInput.files[0];
            if (!file) return;

            processBtn.disabled = true;
            processBtn.textContent = 'Processando...';
            setStatus('Lendo arquivo...', 'processing');

            try {
                // Ler como latin1
                const buffer = await file.arrayBuffer();
                const decoder = new TextDecoder('latin1');
                const text = decoder.decode(buffer);

                setStatus('Parseando CSV...', 'processing');
                await new Promise(r => setTimeout(r, 50)); // let UI update

                const allRows = parseCSV(text);
                if (allRows.length < 2) throw new Error('CSV vazio ou inválido');

                const allHeaders = allRows[0];

                // Filtrar colunas
                const keepIndices = [];
                const headers = [];
                for (let i = 0; i < allHeaders.length; i++) {
                    if (!COLS_TO_DROP.has(allHeaders[i].trim())) {
                        keepIndices.push(i);
                        headers.push(allHeaders[i].trim());
                    }
                }

                const statusIdx = headers.indexOf('Status');

                setStatus('Gerando planilha...', 'processing');
                await new Promise(r => setTimeout(r, 50));

                // Montar dados filtrados
                const data = [headers];
                for (let i = 1; i < allRows.length; i++) {
                    const row = keepIndices.map(idx => (allRows[i][idx] || '').trim());
                    data.push(row);
                }

                // Criar workbook
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(data);

                // Aplicar cores por status
                if (statusIdx >= 0) {
                    for (let r = 1; r < data.length; r++) {
                        const st = (data[r][statusIdx] || '').toLowerCase();
                        let fill = null;

                        if (st === 'aprovada') {
                            fill = { fgColor: { rgb: "C6EFCE" } };
                        } else if (st === 'chargeback' || st === 'med' || st === 'estornada') {
                            fill = { fgColor: { rgb: "FFC7CE" } };
                        }

                        if (fill) {
                            for (let c = 0; c < headers.length; c++) {
                                const addr = XLSX.utils.encode_cell({ r: r, c: c });
                                if (!ws[addr]) ws[addr] = { v: '', t: 's' };
                                ws[addr].s = {
                                    fill: fill,
                                    font: { name: 'Arial', sz: 10 },
                                    alignment: { vertical: 'center' }
                                };
                            }
                        }
                    }

                    // Header style
                    for (let c = 0; c < headers.length; c++) {
                        const addr = XLSX.utils.encode_cell({ r: 0, c: c });
                        if (ws[addr]) {
                            ws[addr].s = {
                                fill: { fgColor: { rgb: "2F5496" } },
                                font: { name: 'Arial', sz: 10, bold: true, color: { rgb: "FFFFFF" } },
                                alignment: { horizontal: 'center', vertical: 'center', wrapText: true }
                            };
                        }
                    }
                }

                // Largura das colunas
                ws['!cols'] = headers.map(h => ({ wch: Math.min(h.length + 5, 40) }));

                XLSX.utils.book_append_sheet(wb, ws, 'Vendas');

                // Nome do arquivo
                const today = new Date();
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const yyyy = today.getFullYear();
                const filename = `kirvano_${dd}-${mm}-${yyyy}.xlsx`;

                // Download
                XLSX.writeFile(wb, filename, { bookSST: false, compression: true });

                setStatus('Pronto! Download iniciado.', 'success');
            } catch (err) {
                setStatus('Erro: ' + err.message, 'error');
            }

            processBtn.disabled = false;
            processBtn.textContent = 'Processar e Baixar';
        }
    </script>
</body>
</html>
