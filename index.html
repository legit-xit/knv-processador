<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirvano Processador</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .upload-area {
            border: 2px dashed #333;
            border-radius: 16px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s;
            background: #111;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #6366f1;
            background: #1a1a2e;
        }
        .upload-area p { color: #888; margin-top: 0.5rem; font-size: 0.85rem; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        input[type="file"] { display: none; }
        .btn {
            display: none;
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: wait; }
        .file-name {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: #1a1a2e;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #a5b4fc;
            display: none;
        }
        .status {
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .processing { color: #a5b4fc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kirvano Processador</h1>
        <p class="sub">Joga o CSV bruto e baixa o .xlsx pronto</p>

        <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📄</div>
            <strong>Clica ou arrasta o CSV aqui</strong>
            <p>Arquivo .csv da plataforma</p>
        </div>

        <div class="file-name" id="fileName"></div>
        <input type="file" id="fileInput" accept=".csv">
        <button class="btn" id="processBtn" onclick="processar()">Processar e Baixar</button>
        <div class="status" id="status"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const statusEl = document.getElementById('status');

        const COLS_TO_DROP = new Set([
            'Comissão', 'Desconto (Valor)', 'Desconto (Automático)', 'Taxas',
            'Parcelamento sem juros', 'Cliente (IP)', 'Cliente (CEP)',
            'Cliente (Logradouro)', 'Cliente (Número)', 'Cliente (Complemento)',
            'Cliente (Bairro)', 'Cliente (Cidade)', 'Cliente (Estado)',
            'Cliente (País)', 'Afiliado (Nome)', 'Afiliado (E-mail)',
            'UTM SRC', 'UTM Source', 'UTM Medium', 'UTM Campaign',
            'UTM Term', 'UTM Content'
        ]);

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; mostrarArquivo(e.dataTransfer.files[0]); }
        });
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) mostrarArquivo(fileInput.files[0]); });

        function mostrarArquivo(file) {
            fileName.textContent = file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB)';
            fileName.style.display = 'block';
            processBtn.style.display = 'block';
            statusEl.style.display = 'none';
        }

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + type;
            statusEl.style.display = 'block';
        }

        function parseCSV(text) {
            // Normalizar quebras de linha
            text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            const rows = [];
            const len = text.length;
            let i = 0;

            while (i < len) {
                const row = [];
                // Parse uma linha
                while (i < len) {
                    if (text[i] === '"') {
                        // Campo entre aspas
                        i++; // pula a aspa de abertura
                        let val = '';
                        while (i < len) {
                            if (text[i] === '"') {
                                if (i + 1 < len && text[i + 1] === '"') {
                                    val += '"';
                                    i += 2;
                                } else {
                                    i++; // pula a aspa de fechamento
                                    break;
                                }
                            } else {
                                // Filtrar chars ilegais pro Excel
                                const code = text.charCodeAt(i);
                                if (code > 31 || code === 9 || code === 10 || code === 13) {
                                    val += text[i];
                                }
                                i++;
                            }
                        }
                        // Truncar pra limite do Excel
                        if (val.length > 32000) val = val.substring(0, 32000);
                        row.push(val);
                        // Pular delimitador ou newline
                        if (i < len && text[i] === ';') { i++; }
                        else if (i < len && text[i] === '\n') { i++; break; }
                        else { break; }
                    } else if (text[i] === ';') {
                        row.push('');
                        i++;
                    } else if (text[i] === '\n') {
                        row.push('');
                        i++;
                        break;
                    } else {
                        // Campo sem aspas
                        let val = '';
                        while (i < len && text[i] !== ';' && text[i] !== '\n') {
                            const code = text.charCodeAt(i);
                            if (code > 31 || code === 9) {
                                val += text[i];
                            }
                            i++;
                        }
                        if (val.length > 32000) val = val.substring(0, 32000);
                        row.push(val);
                        if (i < len && text[i] === ';') { i++; }
                        else if (i < len && text[i] === '\n') { i++; break; }
                        else { break; }
                    }
                }
                if (row.length > 1) rows.push(row);
            }
            return rows;
        }

        async function processar() {
            const file = fileInput.files[0];
            if (!file) return;

            processBtn.disabled = true;
            processBtn.textContent = 'Processando...';
            setStatus('Lendo arquivo...', 'processing');

            // Usar setTimeout pra dar tempo da UI atualizar
            await new Promise(r => setTimeout(r, 50));

            try {
                const buffer = await file.arrayBuffer();
                const text = new TextDecoder('latin1').decode(buffer);

                setStatus('Parseando CSV...', 'processing');
                await new Promise(r => setTimeout(r, 50));

                const allRows = parseCSV(text);
                if (allRows.length < 2) throw new Error('CSV vazio ou inválido');

                const allHeaders = allRows[0];
                const keepIndices = [];
                const headers = [];
                for (let i = 0; i < allHeaders.length; i++) {
                    const h = allHeaders[i].trim();
                    if (!COLS_TO_DROP.has(h)) { keepIndices.push(i); headers.push(h); }
                }

                const statusIdx = headers.indexOf('Status');

                setStatus('Gerando planilha (' + (allRows.length - 1).toLocaleString() + ' linhas)...', 'processing');
                await new Promise(r => setTimeout(r, 50));

                // Criar workbook com ExcelJS
                const wb = new ExcelJS.Workbook();
                const ws = wb.addWorksheet('Vendas');

                // Header
                const headerRow = ws.addRow(headers);
                headerRow.eachCell(cell => {
                    cell.font = { name: 'Arial', size: 10, bold: true, color: { argb: 'FFFFFFFF' } };
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2F5496' } };
                    cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
                    cell.border = {
                        top: { style: 'thin', color: { argb: 'FFD9D9D9' } },
                        bottom: { style: 'thin', color: { argb: 'FFD9D9D9' } },
                        left: { style: 'thin', color: { argb: 'FFD9D9D9' } },
                        right: { style: 'thin', color: { argb: 'FFD9D9D9' } }
                    };
                });

                // Processar em blocos pra não travar a UI
                const CHUNK = 5000;
                for (let i = 1; i < allRows.length; i++) {
                    const rawRow = allRows[i];
                    const row = keepIndices.map(idx => {
                        let v = (rawRow[idx] || '').trim();
                        if (v.length > 32000) v = v.substring(0, 32000);
                        return v;
                    });

                    const excelRow = ws.addRow(row);

                    // Determinar cor
                    let fillColor = null;
                    if (statusIdx >= 0) {
                        const st = row[statusIdx].toLowerCase();
                        if (st === 'aprovada') fillColor = 'FFC6EFCE';
                        else if (st === 'chargeback' || st === 'med' || st === 'estornada') fillColor = 'FFFFC7CE';
                    }

                    excelRow.eachCell({ includeEmpty: true }, cell => {
                        cell.font = { name: 'Arial', size: 10 };
                        cell.alignment = { vertical: 'middle' };
                        cell.border = {
                            top: { style: 'thin', color: { argb: 'FFD9D9D9' } },
                            bottom: { style: 'thin', color: { argb: 'FFD9D9D9' } },
                            left: { style: 'thin', color: { argb: 'FFD9D9D9' } },
                            right: { style: 'thin', color: { argb: 'FFD9D9D9' } }
                        };
                        if (fillColor) {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fillColor } };
                        }
                    });

                    // Dar respiro pra UI a cada bloco
                    if (i % CHUNK === 0) {
                        setStatus('Processando... ' + Math.round(i / (allRows.length - 1) * 100) + '%', 'processing');
                        await new Promise(r => setTimeout(r, 10));
                    }
                }

                // Largura das colunas
                ws.columns.forEach((col, i) => {
                    col.width = Math.min(headers[i].length + 5, 40);
                });

                // Filtro e freeze
                ws.autoFilter = { from: { row: 1, column: 1 }, to: { row: allRows.length, column: headers.length } };
                ws.views = [{ state: 'frozen', ySplit: 1 }];

                setStatus('Finalizando download...', 'processing');
                await new Promise(r => setTimeout(r, 50));

                // Gerar e baixar
                const today = new Date();
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const yyyy = today.getFullYear();
                const filename = `kirvano_${dd}-${mm}-${yyyy}.xlsx`;

                const buf = await wb.xlsx.writeBuffer();
                const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);

                setStatus('Pronto! Download iniciado.', 'success');
            } catch (err) {
                setStatus('Erro: ' + err.message, 'error');
                console.error(err);
            }

            processBtn.disabled = false;
            processBtn.textContent = 'Processar e Baixar';
        }
    </script>
</body>
</html>
